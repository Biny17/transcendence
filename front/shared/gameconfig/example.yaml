# ─────────────────────────────────────────────────────────────────────────────
# GameConfig — example: Capture the Flag
# Loaded by GameConfigLoader and passed to EventHandler.
# ─────────────────────────────────────────────────────────────────────────────

id: ctf
maxPlayers: 10
duration: 600          # seconds (0 = unlimited)
winCondition: highest_score
allowRejoin: true
spectatorAllowed: true

# ─── Teams ───────────────────────────────────────────────────────────────────
teams:
  - id: red
    color: "#ff4444"
    maxPlayers: 5
  - id: blue
    color: "#4488ff"
    maxPlayers: 5

# ─── Events ──────────────────────────────────────────────────────────────────
# Each event maps a named trigger to a list of action ids to execute.
events:
  - name: flag_captured
    actions: [score_point, respawn_flag]

  - name: player_death
    actions: [respawn_player]

  - name: time_up
    actions: [end_game]

  - name: score_limit_reached
    actions: [end_game]

# ─── Actions ─────────────────────────────────────────────────────────────────
# Action handlers are registered by modules/extensions via eventHandler.onAction().
actions:
  - id: score_point
    type: score
    params:
      amount: 1
      target: capturing_team   # resolved at runtime from event data

  - id: respawn_flag
    type: spawn
    params:
      objectType: flag
      position: { x: 0, y: 1, z: 0 }
      delay: 5                 # seconds before respawn

  - id: respawn_player
    type: spawn
    params:
      objectType: player
      position: team_spawn     # resolved at runtime from team config
      delay: 3

  - id: end_game
    type: end_game
    params: {}
