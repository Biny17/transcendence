# $schema: /schemas/map.schema.json
# -----------------------------------------------------------
# Lobby map — calm waiting area before a match starts.
# Uses an equirectangular HDR sky for soft ambient lighting.
# Demonstrates: equirect sky, exponential fog, hemisphere
# light, and the GLTF floor component.
# -----------------------------------------------------------
id: lobby

sky:
  equirect: /textures/sky/overcast.hdr   # HDR for realistic ambient occlusion

fog:
  kind: exponential
  color: 0x99aabb
  density: 0.008

lights:
  - type: hemisphere
    skyColor: 0xaabbcc
    groundColor: 0x554433
    intensity: 0.8

  - type: directional
    color: 0xffffff
    intensity: 0.6
    position: { x: 10, y: 20, z: 10 }
    castShadow: false                   # soft overcast — no hard shadows

  # Warm accent lights at team spawn areas
  - type: point
    color: 0x4488ff
    intensity: 3.0
    position: { x: -8, y: 2, z: 0 }
    distance: 10
    decay: 2

  - type: point
    color: 0xff4422
    intensity: 3.0
    position: { x:  8, y: 2, z: 0 }
    distance: 10
    decay: 2

objects:
  # ── Floor using existing GLTF model ──────────────────────────────────────────
  - id: lobby_floor
    component: /game/components/gltf_floor.yaml
    type: map
    position: { x: 0, y: 0, z: 0 }
    scale: { x: 3, y: 1, z: 3 }

  # ── Team spawn zones ──────────────────────────────────────────────────────────
  - id: spawn_team_blue
    component: /game/components/spawn_point.yaml
    type: map
    position: { x: -8, y: 0.5, z: 0 }
    extraData:
      spawnpoint: { x: -8, y: 0.5, z: 0 }
      teamId: 0

  - id: spawn_team_red
    component: /game/components/spawn_point.yaml
    type: map
    position: { x:  8, y: 0.5, z: 0 }
    extraData:
      spawnpoint: { x: 8, y: 0.5, z: 0 }
      teamId: 1

  # ── Boundary walls ────────────────────────────────────────────────────────────
  - id: wall_north
    component: /game/components/stone_wall.yaml
    type: map
    position: { x: 0, y: 3, z: -12 }
    scale: { x: 3, y: 1, z: 1 }       # wide wall spanning the arena

  - id: wall_south
    component: /game/components/stone_wall.yaml
    type: map
    position: { x: 0, y: 3, z:  12 }
    scale: { x: 3, y: 1, z: 1 }

  - id: wall_west
    component: /game/components/stone_wall.yaml
    type: map
    position: { x: -12, y: 3, z: 0 }
    rotation: { x: 0, y: 1.5708, z: 0 }
    scale: { x: 3, y: 1, z: 1 }

  - id: wall_east
    component: /game/components/stone_wall.yaml
    type: map
    position: { x:  12, y: 3, z: 0 }
    rotation: { x: 0, y: 1.5708, z: 0 }
    scale: { x: 3, y: 1, z: 1 }
