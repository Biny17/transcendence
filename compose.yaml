services:
  web:
    image: oven/bun:latest
    working_dir: /app
    volumes:
      - ./front:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8080
      - NODE_ENV=development
    depends_on:
      - api
    entrypoint: sh -c "bun install && bun dev"
    restart: unless-stopped

  game-server:
    image: oven/bun:latest
    working_dir: /app
    volumes:
      - ./front:/app
      - /app/node_modules
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=development
    depends_on:
      - api
    entrypoint: sh -c "cd server && bun install && cd .. && bun server/index.ts"
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Uncomment to test production build
  # web-prod:
  #   build:
  #     context: ./front
  #     dockerfile: Dockerfile.web
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://api:8080
  #   depends_on:
  #     - api
  #   restart: unless-stopped

volumes:
  postgres_data: