id: parkour
globalLives: 1

phases:
  - id: lobby_wait
    type: wait
    worldId: Lobby
    waitFor: READY
    quorum: 100%
    timeout: 60

  - id: parkour_game
    type: game
    beforeStart:
      - id: load_parkour
        type: wait
        waitFor: WORLD_LOADED
        quorum: 100%
        timeout: 30
      - id: parkour_preview
        type: cinematic
        timeout: 30
    gameModeSelect:
      - condition: "true"
        pick: fixed
        candidates:
          - modeId: Parkour
            winCondition:
              type: quorum_win
              trigger: player_won
              quorum: 1
    elimination:
      livesLost: 1

  - id: lobby_end
    type: end

lobbyWinCondition:
  type: last_with_lives
