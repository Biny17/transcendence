# Schema: ../../shared/schemas/lobby-sequence.schema.json
# ─────────────────────────────────────────────────────────────────────────────
# LobbySequenceConfig — no_life_one_game
# Single game, one winner. Everyone else loses their life and spectates.
# ─────────────────────────────────────────────────────────────────────────────

id: one_game
globalLives: 1

phases:
        - type: wait
          worldId: Lobby
          waitFor: PLAYER_READY
          quorum: 100%
          timeout: 30
          

        - type: game
          sendGameResult: true # when game condition is filled end game and broadcast result to all clients
          endCondition:
                  type: last_with_lives
          gameModeSelect:
                  - condition: "true"
                    pick: fixed
                    candidates:
                            - worldId: Parkour
                              cinematic: false
                              loadTimeout: 60
                              winCondition:
                                      type: quorum_win
                                      trigger: player_won
                                      quorum: 1
                              elimination:
                                      livesLost: 1

        - type: end
          worldId: End
          timeout: 30
